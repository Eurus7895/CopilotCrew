name: code-review-routing
description: >
  Given a PR, suggest the best reviewer(s) — ranked — with a one-sentence
  rationale each. Uses CODEOWNERS, recent touches, and availability.
level: 1
agent: agents/generator.md
evaluator: agents/evaluator.md
schema: schemas/routing-verdict.json
mcp:
  - github
allowed_tools:
  - read
  - mcp
output_subdir: code-review-routing
