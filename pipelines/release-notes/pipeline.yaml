name: release-notes
description: >
  Draft release notes from merged pull requests between two refs (defaults
  to "previous release tag → HEAD"). Groups changes by Highlights /
  Features / Fixes / Internal / Contributors. Level 0 pipeline.
level: 0
agent: agents/generator.md
mcp:
  - github
allowed_tools:
  - read
  - mcp
output_subdir: release-notes
