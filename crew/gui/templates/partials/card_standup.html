<section class="card card-standup" id="card-standup">
  <header class="card-head">
    <h3>Draft standup</h3>
    {% if draft.body %}<span class="card-tag">editable</span>{% endif %}
  </header>
  {% if draft.body %}
    <pre class="standup-body"><code>{{ draft.body }}</code></pre>
  {% else %}
    <p class="card-empty-text">No draft yet. Click <em>Regenerate</em> below.</p>
  {% endif %}
</section>
