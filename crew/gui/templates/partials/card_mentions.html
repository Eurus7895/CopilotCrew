<section class="card">
  <header class="card-head">
    <h3>{{ mentions|length }} mention{{ "s" if mentions|length != 1 else "" }} in Slack</h3>
  </header>
  {% if mentions %}
    <ul class="mention-list">
      {% for m in mentions %}
        <li class="mention-row">
          <span class="mention-channel">{{ m.channel }}</span>
          <span class="mention-body">{{ m.snippet }}</span>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="card-empty-text">No mentions yet.</p>
  {% endif %}
</section>
