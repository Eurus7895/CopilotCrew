<div class="term-turn" data-message-id="{{ message_id }}">
  <div class="term-bubble term-bubble-user">
    <span class="term-bubble-prompt">{{ "you>" }}</span>
    <span class="term-bubble-body">{{ user_text }}</span>
  </div>
  <div class="term-bubble term-bubble-crew" id="chat-msg-{{ message_id }}">
    <span class="term-bubble-prompt">crew&rsaquo;</span>
    <span class="term-bubble-body chat-stream" data-state="streaming"></span>
  </div>
</div>
