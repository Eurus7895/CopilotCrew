<section class="warm-card warm-card-standup" id="card-standup">
  <header class="warm-card-head">
    <h3><em>Draft standup</em></h3>
    {% if draft.body %}<span class="warm-card-tag">pencil &middot; editable</span>{% endif %}
  </header>
  {% if draft.body %}
    <pre class="warm-standup-body"><code>{{ draft.body }}</code></pre>
  {% else %}
    <p class="warm-empty-text">No draft yet. Click <em>Regenerate</em> below.</p>
  {% endif %}
</section>
