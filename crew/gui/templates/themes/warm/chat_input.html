<form class="warm-chat" onsubmit="return false;">
  <span class="warm-chat-avatar" aria-hidden="true">{{ cfg.user_name[:1] | upper }}</span>
  <input
    type="text"
    class="warm-chat-input"
    placeholder="Tell Crew about {{ (selected_event.label if selected_event else 'morning') | lower }}…"
    aria-label="Message Crew"
  >
  <button type="submit" class="warm-chat-send">Send &crarr;</button>
</form>
