<div class="warm-turn" data-message-id="{{ message_id }}">
  <div class="warm-bubble warm-bubble-user">
    <div class="warm-bubble-author">{{ "you" }}</div>
    <div class="warm-bubble-body">{{ user_text }}</div>
  </div>
  <div class="warm-bubble warm-bubble-crew" id="chat-msg-{{ message_id }}">
    <div class="warm-bubble-author">Crew</div>
    <div class="warm-bubble-body chat-stream" data-state="streaming"></div>
  </div>
</div>
