<section class="mod-section">
  <header class="mod-section-head">
    <span class="mod-section-marker">&sect;02</span>
    <h3 class="mod-section-title">{{ mentions|length }} mentions in Slack</h3>
    <span class="mod-section-tag">digest</span>
  </header>
  {% if mentions %}
    <ul class="mod-list">
      {% for m in mentions %}
        <li>
          <span class="mod-list-ref">{{ m.channel | upper }}</span>
          <span class="mod-list-body">{{ m.snippet }}</span>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="mod-empty">No mentions.</p>
  {% endif %}
</section>
