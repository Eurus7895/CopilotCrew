<section class="mod-section mod-standup" id="card-standup">
  <header class="mod-section-head">
    <span class="mod-section-marker">&sect;03</span>
    <h3 class="mod-section-title">Draft standup</h3>
    <span class="mod-section-tag">draft</span>
  </header>
  <div class="mod-standup-bar">
    <span class="mod-standup-title">DRAFT STANDUP</span>
    <span class="mod-standup-tag">EDITABLE</span>
  </div>
  {% if draft.body %}
    <pre class="mod-standup-body">{{ draft.body }}</pre>
  {% else %}
    <p class="mod-empty">No draft yet.</p>
  {% endif %}
</section>
