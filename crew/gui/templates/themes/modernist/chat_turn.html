<div class="mod-turn" data-message-id="{{ message_id }}">
  <div class="mod-bubble mod-bubble-user">
    <div class="mod-bubble-label">USER</div>
    <div class="mod-bubble-body">{{ user_text }}</div>
  </div>
  <div class="mod-bubble mod-bubble-crew" id="chat-msg-{{ message_id }}">
    <div class="mod-bubble-label">CREW</div>
    <div class="mod-bubble-body chat-stream" data-state="streaming"></div>
  </div>
</div>
